global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets:
        - localhost:9090

  - job_name: 'linux_servers'
    static_configs:
      - targets:
        - pg-primary:9100
        - pg-replica:9100
        - monitoring:9100
        - db-admin:9100

  - job_name: 'postgresql'
    static_configs:
      - targets:
        - pg-primary:9187
